<!DOCTYPE html>
<html lang="pt-br">

<head>

    <title>PersonalPro | Inicio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/layout.css">
</head>

<body>
    <main class="pg-container">
        <nav class="menu" id="menu">
            <div class="logo">
                <p>Personal <span>Pro</span></p>
            </div>
            <ul>
                <li><a href="index.html"><i class="bi bi-house"></i><span> Home</span></a></li>
                <li><a href="index.html#sobre"><i class="bi bi-info-circle"></i><span> Sobre</span></a></li>
                <li><a href="index.html#servico"><i class="bi bi-briefcase-fill"></i><span> Serviços</span></a></li>
                <li><a href="index.html#depoimento"><i class="bi bi-chat-dots-fill"></i><span> Depoimentos</span></a>
                </li>
                <li><a href="index.html#contato"><i class="bi bi-person-lines-fill"></i><span> Contato</span></a></li>
                <li><a href="#"><i class="bi bi-door-open"></i><span> Entrar</span></a></li>
            </ul>

        </nav>
        <div class="conteudo">
            <section class="sessao">
                <h2>Contato</h2>
                <form action="" method="post">
                    <div>
                    <label for="nome">Nome</label>
                        <input type="text" name="nome" id="nome" placeholder="Digite seu nome completo" maxlength="50"
                            title="Digite aqui seu nome" required>
                    </div>
                    <div>
                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <div>
                        <label for="sexo">Sexo</label>
                        <select name="sexo" id="sexo">
                            <option selected>Selecione o sexo</option>
                            <option value="F">Feminino</option>
                            <option value="M">Masculilno</option>
                        </select>
                    </div>
                    <input type="submit" value="Enviar">
                </form>
            </section>
            <section class="sessao">
                <h2>Venha nos visitar</h2>
                <div>
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3909.110113436559!2d-61.021658889265!3d-11.54395818860803!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x93b7c1bc8ef08c6f%3A0x938ca0c76b559703!2sR.%20Rio%20Grande%20do%20Norte%2C%20921%20-%20Vista%20Alegre%2C%20Espig%C3%A3o%20D&#39;Oeste%20-%20RO%2C%2076974-000!5e0!3m2!1spt-BR!2sbr!4v1775500720129!5m2!1spt-BR!2sbr"
                        width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                        referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </section>
        </div>
    </main>
    <footer class="footer">
        <p class="footer-logo">Personal<span>Pro</span></p>

        <p class="footer-texto">
            &copy 2026 PersonalPro • Todos os direitos reservados
        </p>
    </footer>

</body>

</html>
