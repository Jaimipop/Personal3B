    <main class="pg-container">
        <nav class="menu" id="menu">
            <div class="logo">
                <p>Personal <span>Pro</span></p>
            </div>
            <ul>
                <li><a href="index.html"><i class="bi bi-house"></i><span> Home</span></a></li>
                <li><a href="index.html#sobre"><i class="bi bi-info-circle"></i><span> Sobre</span></a></li>

            </ul>

        </nav>
        <div class="conteudo">
            <section class="sessao">
                <h2>Contato</h2>
                <div class="form-container">
                    <form action="" method="post">
                    <div class="lc09">
                    <label for="nome">Nome</label>
                        <input type="text" name="nome" id="nome" placeholder="Digite seu nome completo" maxlength="50"
                            title="Digite aqui seu nome" required>
                    </div>
                    <div class="lc8">
                        <label for="email">E-mail</label>
                        <input type="email" name="email" id="email" required>
                    </div>
                    <div class="lc3">
                        <label for="sexo">Sexo</label>
                        <select name="sexo" id="sexo">
                            <option selected>Selecione o sexo</option>
                            <option value="F">Feminino</option>
                            <option value="M">Masculilno</option>
                        </select>
                    </div>
                    <input class="lc2" type="submit" value="Enviar">
                </form>
                </div>
            </section>
            <section class="sessao">
                <h2>Venha nos visitar</h2>
                <div>
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d977.3168247712375!2d-61.01531147383697!3d-11.532673176383161!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x93b7c103325645df%3A0xd3994e346fd9e266!2sCentro%20de%20Treinamento%20Gotham!5e0!3m2!1spt-BR!2sbr!4v1775563257822!5m2!1spt-BR!2sbr" 
                        width="600" height="450" 
                        style="border:0;" 
                        allowfullscreen="" loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                </div>
            </section>
        </div>
